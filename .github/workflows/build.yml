name: Build and Release XLibre for VOID linux

env:
  TAG: workflow-${{ github.run_number }}
  SHA: ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - srcpkgs/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        config:
         # - { arch: x86_64,       host: x86_64,      libc: glibc, platform: linux/amd64, test: 1 }
          - { arch: aarch64,      host: x86_64,      libc: glibc, platform: linux/amd64, test: 0 }
         # - { arch: x86_64-musl,  host: x86_64-musl, libc: musl,  platform: linux/amd64, test: 1 }
         # - { arch: aarch64-musl, host: x86_64-musl, libc: musl,  platform: linux/amd64, test: 0 }
    container:
      image: ghcr.io/void-linux/void-glibc-full:20260301R1
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes:
        - /dev:/dev
      env:
       ARCH: '${{ matrix.config.arch }}'
       XBPS_TARGET_ARCH: "${{ matrix.config.arch }}"
       BOOTSTRAP: '${{ matrix.config.host }}'
       TEST: '${{ matrix.config.test }}'
       REPO_OWNER: "${{ github.repository_owner }}"
       REPO_NAME: "${{ github.event.repository.name }}"
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          # Unset target arch so the host glibc container can update itself properly
          env -u XBPS_TARGET_ARCH xbps-install -Syu xbps
          env -u XBPS_TARGET_ARCH xbps-install -yu
          env -u XBPS_TARGET_ARCH xbps-install -y sudo bash grep jq curl git github-cli
          useradd -G xbuilder -M builder -s $(which bash)

      - name: Checkout xlibre
        uses: actions/checkout@v4
        with:
          repository: void-linux/void-packages
          ref: master

      - name: Merge this repository into void-linux/void-packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "*"
          git remote add -f xlibre-void https://github.com/xlibre-void/xlibre.git
          git merge --no-commit --strategy-option=theirs --allow-unrelated-histories -Xignore-space-change xlibre-void/main
          mkdir -p hostdir/binpkgs
          
          gh release download --pattern "*${ARCH}*" --dir hostdir/binpkgs --repo xlibre-void/xlibre || true
          
          # Clean up mismatched architectures so repodata generates correctly
          if [ "$ARCH" = "x86_64" ]; then
            rm --force hostdir/binpkgs/*x86_64-musl*
          elif [ "$ARCH" = "x86_64-musl" ]; then
            rm --force hostdir/binpkgs/*x86_64.xbps
          fi
          rm --force hostdir/binpkgs/*.xbps.sig2

      - name: Identify changes to build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_name=$(gh release view --json tagName --jq '.tagName' --repo xlibre-void/xlibre || echo "Initial Commit")
          latest_sha=$(git rev-list --max-count=1 ${latest_name} 2>/dev/null || git rev-list --max-parents=0 xlibre-void/main)
          echo "Latest Tag Name: ${latest_name}"
          echo "Latest Tag SHA: ${latest_sha}"

          chown -R builder:builder .

          # This compares the last release against the new commit and ONLY builds what changed
          git diff-tree -r --no-renames --name-only --diff-filter=AM ${latest_sha} ${SHA} -- 'srcpkgs/**' \
          | cut -d/ -f 2 | uniq | xargs sudo -Eu builder ./xbps-src sort-dependencies | tee /tmp/templates

      - name: Determine changed templates
        id: changed
        run: |
            cd extra

            base="${{ github.event.before }}"
            tip="${{ github.sha }}"

            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
                changed_pkgs=$(find srcpkgs -maxdepth 1 -mindepth 1 -type d -printf "%f\n" \
                  | tr '\n' ' ')
                removed_pkgs=""
            else
                changed_pkgs=$(git diff --name-only "$base" "$tip" --diff-filter=AM -- 'srcpkgs/*/template' \
                    | cut -d/ -f2 \
                    | sort -u \
                    | tr '\n' ' ')
                
                removed_pkgs=$(git diff --name-status "$base" "$tip" -- 'srcpkgs/*/template' \
                    | awk '$1=="D"{print $2}' \
                    | cut -d/ -f2 \
                    | sort -u \
                    | tr '\n' ' ')
            fi

            changed_pkgs="${changed_pkgs%% }"
            removed_pkgs="${removed_pkgs%% }"

            echo "Changed templates: ${changed_pkgs:-<none>}"
            echo "Removed templates: ${removed_pkgs:-<none>}"

            echo "pkgs=$changed_pkgs" >> "$GITHUB_OUTPUT"
            echo "removed=$removed_pkgs" >> "$GITHUB_OUTPUT"

      - name: Checkout void-packages
        run: |
            git clone --depth 1 https://github.com/void-linux/void-packages.git void-packages
            cd void-packages
            git checkout --detach master

      - name: Merge templates and edit shlibs
        run: |
            echo "==> copying templates..."
            cp -rv extra/srcpkgs/* void-packages/srcpkgs/

            SHLIBS_FILE="void-packages/common/shlibs"
            APPEND_FILE="extra/shlibs_append"
            REMOVE_FILE="extra/shlibs_remove"

            echo "==> updating common/shlibs..."
            if [ -f "$REMOVE_FILE" ]; then
                while IFS= read -r line; do
                    [ -z "$line" ] && continue
                    grep -vF "$line" "$SHLIBS_FILE" > "$SHLIBS_FILE.tmp" && mv "$SHLIBS_FILE.tmp" "$SHLIBS_FILE"
                    echo "   - removed: $line"
                done < "$REMOVE_FILE"
            fi

            if [ -f "$APPEND_FILE" ]; then
                while IFS= read -r line; do
                    [ -z "$line" ] && continue
                    if ! grep -qF "$line" "$SHLIBS_FILE"; then
                        echo "$line" >> "$SHLIBS_FILE"
                        echo "   + added: $line"
                    fi
                done < "$APPEND_FILE"
            fi

            echo "=> applying inline edits..."
            if [ -d "void-packages/srcpkgs/hyprutils/patches" ]; then
                echo "   - removing void-packages/srcpkgs/hyprutils/patches"
                rm -rf void-packages/srcpkgs/hyprutils/patches
            fi

      - name: Prepare masterdir
        run: |
            cd void-packages
            chown -R builder:builder . &&
            sudo -Eu builder common/travis/set_mirror.sh &&
            sudo -Eu builder common/travis/prepare.sh &&
            common/travis/fetch-xtools.sh

      - name: Build
        id: build_step
        run: |
            export PATH="/opt/xbps/usr/bin/:$PATH"
            cd void-packages

            changed="${{ steps.changed.outputs.pkgs }}"
            removed="${{ steps.changed.outputs.removed }}"

            if [ -z "$changed" ]; then
                echo "No changed templates, skipping build."
                echo "built=" >> "$GITHUB_OUTPUT"
                echo "failed=" >> "$GITHUB_OUTPUT"
                exit 0
            fi

            if [ "$BOOTSTRAP" != "$ARCH" ]; then
                arch="-a $ARCH"
            fi

            if [ "$TEST" = 1 ]; then
                test="-Q"
            fi

            PKGS=$(sudo -Eu builder ./xbps-src $test sort-dependencies $changed)
            built=""
            failed=""

            for pkg in ${PKGS}; do
                if sudo -Eu builder ./xbps-src -j"$(nproc)" -s $arch $test pkg "${pkg}"; then
                    built="$built $pkg"
                else
                    echo "!! build failed for ${pkg}"
                    failed="$failed $pkg"
                fi
            done

            built="${built%% }"
            failed="${failed%% }"

            echo "Built packages: ${built:-<none>}"
            echo "Failed packages: ${failed:-<none>}"

            echo "built=$built" >> "$GITHUB_OUTPUT"
            echo "failed=$failed" >> "$GITHUB_OUTPUT"
          
      # -----------------------------------------------------------

      - name: Clean & sign
        working-directory: ./hostdir/binpkgs
        env:
          PRIVKEY: ${{ secrets.PRIV_KEY }}
          XBPS_PASSPHRASE: ${{ secrets.SIGN_PASS }}
        run: |
          # Only run rindex if there are actually packages built (.xbps files exist)
          if ls *.xbps 1> /dev/null 2>&1; then
            sudo -Eu builder xbps-rindex --remove-obsoletes ${PWD}
            
            if [ -n "${PRIVKEY}" ]; then
              printf "%s\n" "${PRIVKEY}" > key.pem
              sudo -Eu builder xbps-rindex --privkey key.pem --sign --signedby "${REPO_NAME}-github-actions" --verbose ${PWD}
              sudo -Eu builder xbps-rindex --privkey key.pem --sign-pkg --verbose ${PWD}/*.xbps
              sudo -Eu builder rm -f key.pem
            else
              echo "No PRIV_KEY found. Skipping cryptographic signing (normal for forks)."
            fi
            
            sudo -Eu builder xbps-rindex --clean ${PWD}
          else
            echo "No packages were built. Skipping indexing."
          fi

      - name: checksum
        working-directory: ./hostdir/binpkgs
        run: |
          rm -rf *.sha256sum *.sha512sum
          
          # Only run the loop if there are actually files ending in .xbps
          count=$(ls -1 *.xbps 2>/dev/null | wc -l)
          if [ "$count" != 0 ]; then
            for file in *.xbps; do
              sha256sum "${file}" | cut -d ' ' -f 1 > "${file}.sha256sum"
              sha512sum "${file}" | cut -d ' ' -f 1 > "${file}.sha512sum"
            done
          else
            echo "No packages found to checksum."
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.arch }}-repodata
          path: ./hostdir/binpkgs

      - name: short sha
        run: |
          printf "SHORT_SHA=$(git rev-parse --short ${SHA})" >> $GITHUB_ENV

      - name: release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ env.SHORT_SHA }}
          tag_name: ${{ env.TAG }}
          files: |
            ./hostdir/binpkgs/*.xbps            
            ./hostdir/binpkgs/*.sig2
            ./hostdir/binpkgs/*repodata

